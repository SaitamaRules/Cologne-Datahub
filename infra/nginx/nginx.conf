# Cologne DataHub — Nginx reverse proxy configuration.
#
# Runs in front of the Deno/Hono application. At this stage it handles:
#   - Upstream definition (resolved via Docker's internal DNS).
#   - Request forwarding for /api/* and /docs.
#   - Preservation of X-Request-ID and X-Forwarded-* headers.
#   - Structured (JSON) access logs to stdout.
#
# TLS, rate limiting and DMZ-specific tweaks come in later phases.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # --- MIME types and defaults ---------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Hide the Nginx version in error pages and Server headers. Small win, no cost.
    server_tokens  off;

    # --- Access log: one JSON line per request -------------------------------
    # Lines up with the app's own JSON logs so an aggregator can correlate by
    # X-Request-ID across both layers.
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$http_x_request_id",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # --- Upstream: the Deno/Hono application ---------------------------------
    # "app" resolves via Docker's embedded DNS to the app service in the
    # compose network. `keepalive` pools connections so each request does
    # not pay TCP handshake cost.
    upstream cologne_app {
        server app:8000;
        keepalive 32;
    }

    # --- Virtual server: single entry point ----------------------------------
    server {
        listen       80  default_server;
        server_name  _;

        # Small-but-sane request size cap. The API accepts JSON; nothing here
        # should come close to this. Lowers the blast radius of a bad client.
        client_max_body_size  1m;

        # --- Request ID propagation -----------------------------------------
        # If the client sends X-Request-ID, honour it. Otherwise mint one at
        # the edge so downstream logs can still correlate. The application
        # will see either value in its requestLogger middleware.
        set $reqid $http_x_request_id;
        if ($reqid = "") {
            set $reqid $request_id;
        }

        # --- Health check at the edge ----------------------------------------
        # Lets external probes hit Nginx itself without touching the app.
        # Returns 200 as long as Nginx is up. For readiness (is the app
        # reachable?), clients should hit /health/ready which is proxied.
        location = /nginx-health {
            access_log  off;
            return 200  "ok\n";
            add_header  Content-Type  text/plain;
        }

        # --- Proxied locations -----------------------------------------------
        # Common proxy configuration factored into a named snippet.
        location /api/ {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location = /health {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location = /health/ready {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location /docs {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        # --- Anything else: 404 at the edge ----------------------------------
        # Explicit deny-by-default. Unknown paths never reach the app,
        # shrinking the surface exposed by Nginx to the outside world.
        location / {
            return 404;
        }
    }
}
