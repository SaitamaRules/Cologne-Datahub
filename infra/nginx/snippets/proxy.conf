# Common proxy configuration, included from each proxied location.
# Keeping this in one place avoids drift between routes and makes future
# changes (e.g. rate-limit directives in Phase 5) trivial to apply.

proxy_http_version  1.1;

# Forwarded identity of the original client.
proxy_set_header  Host               $host;
proxy_set_header  X-Real-IP          $remote_addr;
proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header  X-Forwarded-Proto  $scheme;
proxy_set_header  X-Forwarded-Host   $host;

# Request ID propagation (see server block for how $reqid is set).
proxy_set_header  X-Request-ID       $reqid;

# Connection reuse towards the upstream pool. Matches `keepalive 32`
# in the upstream{} block.
proxy_set_header  Connection         "";

# Sensible timeouts. The API is meant to be fast; if a request takes
# longer than this, something is wrong upstream.
proxy_connect_timeout  5s;
proxy_send_timeout     30s;
proxy_read_timeout     30s;

# Do not buffer responses to disk — the payloads are small JSON bodies.
proxy_buffering  off;
