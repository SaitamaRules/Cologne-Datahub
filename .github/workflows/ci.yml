name: CI

on:
  push:
    branches: [main, "tfc/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege: the default GITHUB_TOKEN is read-only for all
# jobs. Override per-job if something ever needs more.
permissions:
  contents: read

# Cancel in-flight runs for the same branch when a new commit arrives.
# Keeps the runners free and gives faster feedback.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.12

      - name: Check formatting
        working-directory: ./app
        run: deno fmt --check

      - name: Lint
        working-directory: ./app
        run: deno lint

      - name: Typecheck
        working-directory: ./app
        run: deno check src/main.ts

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.12

      - name: Start ephemeral test databases
        run: docker compose -f infra/docker-compose.test.yml up -d --wait

      - name: Wait for databases to accept connections
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 5433 && nc -z 127.0.0.1 27018; then
              echo "Both databases ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timeout waiting for databases"
          docker compose -f infra/docker-compose.test.yml ps
          docker compose -f infra/docker-compose.test.yml logs
          exit 1

      - name: Run integration tests
        working-directory: ./app
        run: deno test --allow-net --allow-env --allow-read

      - name: Stop ephemeral test databases
        if: always()
        run: docker compose -f infra/docker-compose.test.yml down -v

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: false
          tags: cologne-datahub:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: End-to-end (proxy with TLS and rate limiting)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create minimal .env for compose
        run: |
          cat > .env <<'EOF'
          DB_NAME=cologne_datahub
          DB_USER=postgres
          DB_PASSWORD=ci-password
          API_KEY=ci-api-key
          EOF

      # Generate a fresh internal CA and server certificate just for this
      # run. The certificates never leave the runner; they are produced
      # exactly the same way Francisco would on his laptop, exercising the
      # script that ships with the project.
      - name: Generate ephemeral certificates
        run: |
          docker run --rm -v "$PWD/infra/certs:/work" -w /work \
            --entrypoint sh alpine/openssl generate-certs.sh
          ls -la infra/certs/out/

      - name: Build images
        run: docker compose -f infra/docker-compose.yml --env-file .env build

      - name: Start the full stack
        run: docker compose -f infra/docker-compose.yml --env-file .env up -d

      - name: Wait for stack to become healthy
        run: |
          for i in {1..60}; do
            unhealthy=$(docker compose -f infra/docker-compose.yml --env-file .env ps \
              --format '{{.Service}}\t{{.Health}}' \
              | awk -F'\t' '$2 != "healthy" && $2 != "" { print $1 }')
            if [ -z "$unhealthy" ]; then
              echo "All services healthy after ${i}s"
              docker compose -f infra/docker-compose.yml --env-file .env ps
              exit 0
            fi
            echo "Still waiting on: $unhealthy"
            sleep 2
          done
          echo "Timeout waiting for services to become healthy"
          docker compose -f infra/docker-compose.yml --env-file .env ps
          docker compose -f infra/docker-compose.yml --env-file .env logs --tail=100
          exit 1

      - name: Verify proxy ports are reachable
        run: |
          for i in {1..15}; do
            if nc -z 127.0.0.1 80 && nc -z 127.0.0.1 443; then
              echo "Ports 80 and 443 open after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Ports never opened"
          docker compose -f infra/docker-compose.yml --env-file .env ps
          docker compose -f infra/docker-compose.yml --env-file .env logs nginx --tail=100
          exit 1

      - name: Probe the proxy over HTTPS
        env:
          CACERT: infra/certs/out/ca.crt
        run: |
          set -e

          echo "::group::nginx-health (plain HTTP, internal probe path)"
          curl --fail --silent --show-error http://127.0.0.1/nginx-health
          echo
          echo "::endgroup::"

          echo "::group::HTTP -> HTTPS redirect on /health"
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            http://127.0.0.1/health)
          location=$(curl --silent --head http://127.0.0.1/health | grep -i '^location:' | tr -d '\r')
          echo "status=$status"
          echo "$location"
          test "$status" = "301"
          echo "$location" | grep -qi '^location: https://'
          echo "::endgroup::"

          echo "::group::/health over HTTPS"
          curl --fail --silent --show-error --cacert "$CACERT" \
            https://127.0.0.1/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          echo
          echo "::endgroup::"

          echo "::group::/health/ready over HTTPS (both engines)"
          curl --fail --silent --show-error --cacert "$CACERT" \
            https://127.0.0.1/health/ready | tee /tmp/ready.json
          grep -q '"postgres":"ok"' /tmp/ready.json
          grep -q '"mongo":"ok"' /tmp/ready.json
          echo
          echo "::endgroup::"

          echo "::group::HSTS header is present"
          response_headers=$(curl --silent --show-error -D - -o /dev/null \
            --cacert "$CACERT" https://127.0.0.1/health)
          echo "$response_headers"
          echo "$response_headers" | grep -qi '^strict-transport-security: max-age='
          echo "::endgroup::"

          echo "::group::X-Request-ID round-trip over HTTPS"
          response_headers=$(curl --silent --show-error -D - -o /dev/null \
            --cacert "$CACERT" \
            -H "X-Request-ID: ci-smoke-test" https://127.0.0.1/health)
          echo "$response_headers"
          echo "$response_headers" | grep -qi "^x-request-id: ci-smoke-test"
          echo "::endgroup::"

          echo "::group::Unknown path returns 404 at the edge"
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --cacert "$CACERT" https://127.0.0.1/does-not-exist)
          test "$status" = "404"
          echo "OK (got $status)"
          echo "::endgroup::"

          echo "::group::TLS 1.0 is rejected"
          # openssl s_client returns non-zero when the protocol is rejected.
          # We invert the check: if it succeeds, the server accepted TLS 1.0
          # and the test fails.
          if echo | docker run --rm -i --network host alpine/openssl \
            s_client -connect 127.0.0.1:443 -tls1 2>/dev/null \
            | grep -q "Cipher    :"; then
            echo "TLS 1.0 was accepted — this is wrong"
            exit 1
          fi
          echo "OK (TLS 1.0 rejected)"
          echo "::endgroup::"

      # Burst test against the read endpoint. The reads_zone is rate-limited
      # at 30 req/s with burst=60, so a 10-second wrk run with high
      # concurrency should produce a clear majority of 429s. Tolerant
      # threshold: at least 70% of responses must be non-2xx, which leaves
      # plenty of margin for slow runners.
      - name: Burst test — rate limiting on /api/trees
        run: |
          set -e

          # wrk's exit code does not reflect HTTP statuses; we parse stdout.
          output=$(docker run --rm --network host williamyeh/wrk \
            -t2 -c20 -d10s --timeout 5s \
            "https://127.0.0.1/api/trees?limit=1" 2>&1 || true)

          echo "$output"

          total=$(echo "$output" | grep -oE '[0-9]+ requests in' | grep -oE '[0-9]+')
          rejected=$(echo "$output" | grep -oE 'Non-2xx or 3xx responses: [0-9]+' \
            | grep -oE '[0-9]+$' || echo 0)

          echo "total=$total rejected=$rejected"

          # Compute rejection ratio as integer percentage (avoid bc dependency).
          if [ "${total:-0}" -lt 100 ]; then
            echo "Total requests too low to assert anything meaningful"
            exit 1
          fi
          ratio=$(( rejected * 100 / total ))
          echo "Rejection ratio: ${ratio}%"

          # Anything below 70% suggests the rate limit is not effective.
          if [ "$ratio" -lt 70 ]; then
            echo "Rate limit appears ineffective (rejected only ${ratio}%)"
            exit 1
          fi
          echo "OK (rejected ${ratio}% of ${total} requests)"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml --env-file .env logs --tail=200

      - name: Tear down the stack
        if: always()
        run: docker compose -f infra/docker-compose.yml --env-file .env down -v
