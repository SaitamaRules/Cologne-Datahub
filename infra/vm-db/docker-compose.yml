# vm-db — LAN host stack (PostgreSQL + MongoDB).
#
# Two independent data services sharing a host. They do not talk to
# each other; the application on vm-app is the only client of both.
#
# DNS: the containers point at BIND9 on vm-web (192.168.113.30) for
# consistency. They don't actually need to resolve any FQDN to work,
# but routing all DNS through BIND9 keeps the monitoring story simple
# in Phase 9.
#
# Backups live in this host and are added in Phase 8.

name: cologne-datahub-db

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../app/queries/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    dns:
      - 192.168.113.30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    dns:
      - 192.168.113.30
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pg_data:
  mongo_data:
