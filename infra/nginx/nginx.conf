# Cologne DataHub — Nginx reverse proxy with TLS termination.
#
# Two server blocks:
#   - Port 80  redirects everything to HTTPS, except /nginx-health which
#              stays plain HTTP so internal healthchecks in compose can
#              probe without dealing with the internal CA.
#   - Port 443 terminates TLS with the certificate issued by the project's
#              own CA (see infra/certs/) and proxies to the application.
#
# TLS posture:
#   - Protocols: TLS 1.2 and TLS 1.3 only. SSLv3, TLS 1.0 and TLS 1.1 are
#     disabled.
#   - Ciphers: a conservative modern selection. Server preference is
#     enforced for TLS 1.2; TLS 1.3 negotiates its own suites.
#   - HSTS: enabled with a one-year max-age and includeSubDomains. No
#     preload — that's reserved for production with a real domain.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # --- MIME types and defaults ---------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server_tokens  off;

    # --- Access log: one JSON line per request -------------------------------
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$http_x_request_id",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"scheme":"$scheme"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # --- Upstream: the Deno/Hono application ---------------------------------
    upstream cologne_app {
        server app:8000;
        keepalive 32;
    }

    # --- TLS configuration (shared across server blocks) ---------------------
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Session cache: 10 MB ≈ 40k sessions. Tickets disabled for forward
    # secrecy guarantees (each new session does a fresh key exchange).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # --- Plain HTTP server: redirect to HTTPS, health endpoint stays in 80 ---
    server {
        listen       80  default_server;
        server_name  _;

        # Health probe served directly by Nginx, no TLS. Compose's internal
        # healthcheck uses this; keeping it on 80 avoids embedding the
        # internal CA into the BusyBox client used by the healthcheck.
        location = /nginx-health {
            access_log  off;
            return 200  "ok\n";
            add_header  Content-Type  text/plain;
        }

        # Everything else: 301 to HTTPS, preserving path and query.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS server --------------------------------------------------------
    server {
        listen       443  ssl  default_server;
        http2        on;
        server_name  _;

        client_max_body_size  1m;

        # HSTS: tell compliant clients to use HTTPS for a year. No preload
        # because the domain is internal and the preload list is for public
        # production domains only.
        add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains"  always;

        # Request ID propagation (honour incoming, mint at edge if missing).
        set $reqid $http_x_request_id;
        if ($reqid = "") {
            set $reqid $request_id;
        }

        # --- Proxied locations ---------------------------------------------
        location /api/ {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location = /health {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location = /health/ready {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location /docs {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        # --- Anything else: 404 at the edge --------------------------------
        location / {
            return 404;
        }
    }
}
