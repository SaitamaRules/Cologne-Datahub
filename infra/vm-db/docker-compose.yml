# vm-db — LAN host stack (PostgreSQL + MongoDB).
#
# Two independent data services sharing a host. They do not talk to
# each other; the application on vm-app is the only client of both.
#
# DNS: the containers point at BIND9 on vm-web (192.168.113.30) for
# consistency. They don't actually need to resolve any FQDN to work,
# but routing all DNS through BIND9 keeps the monitoring story simple
# in Phase 9.
#
# Backups (Phase 8) run on this host: a `backup` helper container holds
# the dump tooling and Ofelia triggers it on a daily schedule. Archives
# land in ./backups (gitignored).
#
# Monitoring (Phase 9): a stdlib-only `monitor` container TCP-probes the
# lab's services and alerts on up/down transitions via Telegram.

name: cologne-datahub-db

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../app/queries/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    dns:
      - 192.168.113.30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    dns:
      - 192.168.113.30
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Phase 8: automated backups -------------------------------------------
  # Holds pg_dump/pg_restore + mongodump/mongorestore + curl. Idles; Ofelia
  # execs backup.sh on schedule. Secrets come from .env; non-secret wiring
  # (hostnames, retention) is declared here so it stays visible in git.
  backup:
    build: ./backup
    image: cologne-datahub-backup:1.0
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
      MONGO_URI: mongodb://mongo:27017
      OPNSENSE_HOST: 10.10.10.1
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
    volumes:
      - ./backups:/backups
    dns:
      - 192.168.113.30
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"]
    labels:
      ofelia.enabled: "true"
      # cron with seconds field: sec min hour dom mon dow -> 03:00:00 daily
      ofelia.job-exec.daily-backup.schedule: "0 0 3 * * *"
      ofelia.job-exec.daily-backup.command: "/usr/local/bin/backup.sh"

  # Low-footprint job scheduler. Reads schedules from container labels.
  ofelia:
    image: mcuadros/ofelia:0.3.22
    restart: unless-stopped
    depends_on:
      - backup
    command: daemon --docker
    environment:
      TZ: Europe/Berlin   # switch to Europe/Madrid after returning to Spain
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # --- Phase 9: service monitor ---------------------------------------------
  # Stdlib-only TCP availability monitor. Reaches the local databases by
  # service name and the remote services (api/nginx/bind9) by lab IP.
  # Telegram credentials come from .env; alerts fall back to the log if unset.
  monitor:
    build: ./monitor
    image: cologne-datahub-monitor:1.0
    restart: unless-stopped
    env_file: .env
    environment:
      CHECK_INTERVAL: "30"
      TCP_TIMEOUT: "5"
      STARTUP_DELAY: "15"
      TZ: Europe/Berlin   # switch to Europe/Madrid after returning to Spain
    dns:
      - 192.168.113.30

volumes:
  pg_data:
  mongo_data:
