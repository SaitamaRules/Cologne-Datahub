# Cologne DataHub — Nginx reverse proxy with TLS termination
# and L7 rate limiting.
#
# Two server blocks:
#   - Port 80  redirects everything to HTTPS, except /nginx-health which
#              stays plain HTTP so internal healthchecks in compose can
#              probe without dealing with the internal CA.
#   - Port 443 terminates TLS with the certificate issued by the project's
#              own CA (see infra/certs/) and proxies to the application.
#
# Rate-limiting strategy (see infra/nginx/RATE_LIMITS.md for justification):
#   - reads_zone   30 req/s  burst=60   for GET /api/*
#   - writes_zone   5 req/s  burst=10   for POST/PUT/DELETE /api/*
#   - docs_zone     2 req/s  burst=5    for /docs
#   - conn_zone   max 20 simultaneous connections per IP across all locations
#   - /health and /health/ready are not rate-limited (internal healthchecks)
#
# When a limit is exceeded, Nginx returns 429 Too Many Requests. The
# `nodelay` modifier means burst requests are served immediately rather
# than queued, which is what we want for a low-latency API.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # --- MIME types and defaults ---------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server_tokens  off;

    # --- Access log: one JSON line per request -------------------------------
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$http_x_request_id",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"scheme":"$scheme"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # --- Rate-limiting zones -------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=reads_zone:10m   rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=writes_zone:10m  rate=5r/s;
    limit_req_zone  $binary_remote_addr  zone=docs_zone:10m    rate=2r/s;

    limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

    limit_req_status   429;
    limit_conn_status  429;

    limit_req_log_level   warn;
    limit_conn_log_level  warn;

    # --- Upstream: the Deno/Hono application ---------------------------------
    # Resolved through the internal BIND9 server (cologne.local zone). In
    # Phase 7 the IP behind this name will change to a LAN-side address,
    # but the upstream definition does not need to.
    upstream cologne_app {
        server api.cologne.local:8000;
        keepalive 32;
    }

    # --- TLS configuration (shared across server blocks) ---------------------
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # --- Plain HTTP server: redirect to HTTPS, health endpoint stays in 80 ---
    server {
        listen       80  default_server;
        server_name  _;

        location = /nginx-health {
            access_log  off;
            return 200  "ok\n";
            add_header  Content-Type  text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS server --------------------------------------------------------
    server {
        listen       443  ssl  default_server;
        http2        on;
        server_name  _;

        client_max_body_size  1m;

        limit_conn  conn_zone  20;

        add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains"  always;

        set $reqid $http_x_request_id;
        if ($reqid = "") {
            set $reqid $request_id;
        }

        # --- API routes: split by HTTP method to apply different limits -----
        location /api/ {
            limit_except GET HEAD OPTIONS {
            }

            if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
                rewrite ^ /__write$request_uri last;
            }

            limit_req  zone=reads_zone  burst=60  nodelay;

            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location /__write/ {
            internal;

            limit_req  zone=writes_zone  burst=10  nodelay;

            include /etc/nginx/snippets/proxy.conf;
            rewrite ^/__write(/.*)$ $1 break;
            proxy_pass http://cologne_app;
        }

        # --- Health endpoints: no rate limiting -----------------------------
        location = /health {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        location = /health/ready {
            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        # --- Swagger UI: tighter limit, low natural traffic -----------------
        location /docs {
            limit_req  zone=docs_zone  burst=5  nodelay;

            include /etc/nginx/snippets/proxy.conf;
            proxy_pass http://cologne_app;
        }

        # --- Anything else: 404 at the edge --------------------------------
        location / {
            return 404;
        }
    }
}
