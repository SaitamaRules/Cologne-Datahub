# Compose stack for Cologne DataHub.
# Invoked from the repository root via the root Makefile (make up / make down).
#
# Networks:
#   default — internal bridge with a fixed /24 subnet so the BIND9 zone
#             file can pin service addresses. Only the `nginx` service
#             publishes ports to the host.
#
# Volumes:
#   pg_data    — PostgreSQL data directory
#   mongo_data — MongoDB data directory
#
# Service-to-service communication uses FQDNs from the cologne.local
# zone (resolved by the bind9 service). Nothing in the application
# config refers to compose service names directly any more — that
# decoupling is what allows Phase 7 to relocate services across
# DMZ/LAN segments without touching the application code.

name: cologne-datahub

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

services:
  bind9:
    image: ubuntu/bind9:latest
    restart: unless-stopped
    volumes:
      - ./bind9/named.conf:/etc/bind/named.conf:ro
      - ./bind9/zones:/etc/bind/zones:ro
    networks:
      default:
        ipv4_address: 172.28.0.5
    healthcheck:
      test: ["CMD-SHELL", "pgrep named || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../app/queries/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      default:
        ipv4_address: 172.28.0.10
    dns:
      - 172.28.0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      default:
        ipv4_address: 172.28.0.11
    dns:
      - 172.28.0.5
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: ../app
    image: cologne-datahub:dev
    restart: unless-stopped
    depends_on:
      bind9:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      DB_HOST: db-pg.cologne.local
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_URI: mongodb://db-mongo.cologne.local:27017
      API_KEY: ${API_KEY}
      PORT: "8000"
    networks:
      default:
        ipv4_address: 172.28.0.20
    dns:
      - 172.28.0.5
    healthcheck:
      test:
        - "CMD"
        - "deno"
        - "eval"
        - "const r = await fetch('http://localhost:8000/health'); if (r.status !== 200) Deno.exit(1);"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./certs/out:/etc/nginx/certs:ro
    networks:
      default:
        ipv4_address: 172.28.0.30
    dns:
      - 172.28.0.5
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # One-shot data loaders. Not started by default.
  # Use:  docker compose -f infra/docker-compose.yml --profile import run --rm import-pg
  #       docker compose -f infra/docker-compose.yml --profile import run --rm import-mongo
  #
  # Both require app/data/baumkataster.json to exist on the host.
  # Fetch it beforehand with:  make fetch-data

  import-pg:
    profiles: ["import"]
    image: cologne-datahub:dev
    depends_on:
      bind9:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: db-pg.cologne.local
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY: ${API_KEY}
    dns:
      - 172.28.0.5
    volumes:
      - ../app/scripts:/app/scripts:ro
      - ../app/data:/app/data:ro
    command:
      - "deno"
      - "run"
      - "--allow-read=/app"
      - "--allow-net"
      - "--allow-env"
      - "scripts/import_pg.ts"

  import-mongo:
    profiles: ["import"]
    image: cologne-datahub:dev
    depends_on:
      bind9:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://db-mongo.cologne.local:27017
      API_KEY: ${API_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
    dns:
      - 172.28.0.5
    volumes:
      - ../app/scripts:/app/scripts:ro
      - ../app/data:/app/data:ro
    command:
      - "deno"
      - "run"
      - "--allow-read=/app"
      - "--allow-net"
      - "--allow-env"
      - "scripts/import_mongo.ts"

volumes:
  pg_data:
  mongo_data:
