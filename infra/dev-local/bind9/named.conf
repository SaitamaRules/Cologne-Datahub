// BIND9 configuration for Cologne DataHub's internal DNS.
//
// Authoritative for the cologne.local zone. Does not recurse: queries
// for anything outside this zone return REFUSED. Public DNS resolution
// stays the responsibility of the host's resolver.
//
// In Phase 6 the server runs inside Docker Compose with a fixed subnet
// (172.28.0.0/24, see compose `networks` block). Each service has a
// pinned IP that the zone file references directly. In Phase 7 the
// stack moves to real LAN/DMZ segments behind OPNsense; only the
// addresses inside the zone files change, the rest of the configuration
// is reused as-is.

options {
    directory "/var/cache/bind";

    // Authoritative-only. No recursion.
    recursion no;
    allow-recursion { none; };

    // Listen on every interface inside the container.
    listen-on    { any; };
    listen-on-v6 { none; };

    // Restrict who can query us. The compose network is fixed at
    // 172.28.0.0/24 (see docker-compose.yml). 127.0.0.1 is included
    // for local debugging via `dig` from inside the container.
    allow-query { 172.28.0.0/24; 127.0.0.1; };

    // Disable zone transfers. Nothing in the project pulls zones.
    allow-transfer { none; };

    // Hide the version string. Small win, no cost.
    version "internal";
};

// Forward zone for cologne.local.
zone "cologne.local" {
    type master;
    file "/etc/bind/zones/db.cologne.local";
};

// Reverse zone matching the compose subnet. Useful for `dig -x` from
// inside the network and for sanity checks; in Phase 7 the equivalent
// reverse zone for the LAN segment will replace it.
zone "28.172.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.172.28";
};
