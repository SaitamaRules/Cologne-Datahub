name: CI

on:
  push:
    branches: [main, "tfc/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege: the default GITHUB_TOKEN is read-only for all
# jobs. Override per-job if something ever needs more.
permissions:
  contents: read

# Cancel in-flight runs for the same branch when a new commit arrives.
# Keeps the runners free and gives faster feedback.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.12

      - name: Check formatting
        working-directory: ./app
        run: deno fmt --check

      - name: Lint
        working-directory: ./app
        run: deno lint

      - name: Typecheck
        working-directory: ./app
        run: deno check src/main.ts

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.12

      - name: Start ephemeral test databases
        run: docker compose -f infra/docker-compose.test.yml up -d --wait

      - name: Wait for databases to accept connections
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 5433 && nc -z 127.0.0.1 27018; then
              echo "Both databases ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timeout waiting for databases"
          docker compose -f infra/docker-compose.test.yml ps
          docker compose -f infra/docker-compose.test.yml logs
          exit 1

      - name: Run integration tests
        working-directory: ./app
        run: deno test --allow-net --allow-env --allow-read

      - name: Stop ephemeral test databases
        if: always()
        run: docker compose -f infra/docker-compose.test.yml down -v

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          tags: cologne-datahub:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: End-to-end (proxy)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create minimal .env for compose
        run: |
          cat > .env <<'EOF'
          DB_NAME=cologne_datahub
          DB_USER=postgres
          DB_PASSWORD=ci-password
          API_KEY=ci-api-key
          EOF

      - name: Build images
        run: docker compose -f infra/docker-compose.yml --env-file .env build

      - name: Start the full stack
        run: docker compose -f infra/docker-compose.yml --env-file .env up -d

      - name: Wait for stack to become healthy
        run: |
          for i in {1..60}; do
            unhealthy=$(docker compose -f infra/docker-compose.yml --env-file .env ps \
              --format '{{.Service}}\t{{.Health}}' \
              | awk -F'\t' '$2 != "healthy" && $2 != "" { print $1 }')
            if [ -z "$unhealthy" ]; then
              echo "All services healthy after ${i}s"
              docker compose -f infra/docker-compose.yml --env-file .env ps
              exit 0
            fi
            echo "Still waiting on: $unhealthy"
            sleep 2
          done
          echo "Timeout waiting for services to become healthy"
          docker compose -f infra/docker-compose.yml --env-file .env ps
          docker compose -f infra/docker-compose.yml --env-file .env logs --tail=100
          exit 1

      - name: Verify proxy port is reachable
        run: |
          for i in {1..15}; do
            if nc -z 127.0.0.1 80; then
              echo "Port 80 open after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Port 80 never opened"
          docker compose -f infra/docker-compose.yml --env-file .env ps
          docker compose -f infra/docker-compose.yml --env-file .env logs nginx --tail=100
          exit 1

      - name: Probe the proxy
        run: |
          set -e
          echo "::group::nginx-health (edge)"
          curl --fail --silent --show-error http://127.0.0.1/nginx-health
          echo
          echo "::endgroup::"

          echo "::group::/health (proxied to app)"
          curl --fail --silent --show-error http://127.0.0.1/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          echo
          echo "::endgroup::"

          echo "::group::/health/ready (proxied, both engines)"
          curl --fail --silent --show-error http://127.0.0.1/health/ready | tee /tmp/ready.json
          grep -q '"postgres":"ok"' /tmp/ready.json
          grep -q '"mongo":"ok"' /tmp/ready.json
          echo
          echo "::endgroup::"

          echo "::group::X-Request-ID round-trip"
          response_headers=$(curl --silent --show-error -D - -o /dev/null \
            -H "X-Request-ID: ci-smoke-test" http://127.0.0.1/health)
          echo "$response_headers"
          echo "$response_headers" | grep -qi "^x-request-id: ci-smoke-test"
          echo "::endgroup::"

          echo "::group::Unknown path returns 404 at the edge"
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            http://127.0.0.1/does-not-exist)
          test "$status" = "404"
          echo "OK (got $status)"
          echo "::endgroup::"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml --env-file .env logs --tail=200

      - name: Tear down the stack
        if: always()
        run: docker compose -f infra/docker-compose.yml --env-file .env down -v
