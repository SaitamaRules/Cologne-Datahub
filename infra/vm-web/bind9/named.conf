// BIND9 configuration for the Phase 7 lab DNS server (vm-web).
//
// Role: authoritative for `cologne.local` (forward + two reverse zones)
//       and a recursive resolver for the DMZ and LAN segments.
//
// Externally-resolved names are forwarded to OPNsense's Unbound on the
// DMZ gateway (192.168.113.1); BIND9 never talks to root servers
// directly. This makes OPNsense the single egress point for DNS, which
// matters for both firewall rule simplicity and Phase 9 monitoring.

acl "trusted" {
    192.168.113.0/24;   // DMZ
    10.10.10.0/24;      // LAN
    127.0.0.1;
};

options {
    directory "/var/cache/bind";

    listen-on { any; };
    listen-on-v6 { none; };

    // Recursion is restricted to the lab networks. Anything else,
    // including the WAN side of OPNsense, is denied implicitly.
    recursion yes;
    allow-recursion { trusted; };
    allow-query { trusted; };

    // External names go through OPNsense's Unbound. `forward only`
    // means: if Unbound can't resolve it, we don't try to reach root
    // servers ourselves (we couldn't anyway: OPNsense filters
    // outbound DNS).
    forwarders {
        192.168.113.1;
    };
    forward only;

    dnssec-validation auto;

    // Hardening: smaller responses, no version disclosure, no zone
    // transfers (single-server setup, no slaves).
    minimal-responses yes;
    version none;
    allow-transfer { none; };
};

zone "cologne.local" {
    type master;
    file "/etc/bind/zones/db.cologne.local";
    allow-transfer { none; };
};

zone "113.168.192.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.192.168.113";
    allow-transfer { none; };
};

zone "10.10.10.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.10.10.10";
    allow-transfer { none; };
};
